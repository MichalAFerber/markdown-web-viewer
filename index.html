<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#ffffff" id="themeColor">
<meta name="description" content="A fast, single-file Markdown viewer. Drag & drop any text file to render it.">
<title>MyKK Markdown Viewer</title>
<!-- Privacy-friendly, cookieless analytics (self-hosted Plausible) -->
<script defer data-domain="markdown-viewer.us" src="https://plausible.thompsonblack.us/js/script.js"></script>
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20640%20512'%3E%3Cpath%20fill%3D'%234f46e5'%20d%3D'M593.8%2059.1H46.2C20.7%2059.1%200%2079.8%200%20105.2v301.5c0%2025.5%2020.7%2046.2%2046.2%2046.2h547.7c25.5%200%2046.2-20.7%2046.1-46.1V105.2c0-25.4-20.7-46.1-46.2-46.1zM338.5%20360.6H277v-120l-61.5%2076.9-61.5-76.9v120H92.3V151.4h61.5l61.5%2076.9%2061.5-76.9h61.5v209.2zm135.3%203.1L381.5%20256H443V151.4h61.5V256H566z'%2F%3E%3C%2Fsvg%3E">
<style>
  :root{
    --bg:#ffffff; --surface:#ffffff; --header-bg:rgba(255,255,255,.9);
    --text:#1f2328; --muted:#656d76; --border:#d0d7de; --border-soft:#e5e7eb;
    --accent:#4f46e5; --accent-contrast:#ffffff;
    --code-bg:#f6f8fa; --code-text:#1f2328; --hover:#f3f4f6;
    --quote-border:#d0d7de; --overlay:rgba(79,70,229,.10); --shadow:rgba(0,0,0,.12);
    --table-stripe:#f6f8fa;
  }
  *{box-sizing:border-box}
  [hidden]{display:none!important}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif,"Apple Color Emoji","Segoe UI Emoji";
    -webkit-font-smoothing:antialiased; line-height:1.55;
    min-height:100vh; min-height:100dvh; display:flex; flex-direction:column;
    overflow-wrap:break-word;
  }
  .skip{position:absolute;left:-999px;top:0;background:var(--accent);color:var(--accent-contrast);padding:.5rem .75rem;border-radius:6px;z-index:100}
  .skip:focus{left:.5rem;top:.5rem}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:30;
    display:flex; align-items:center; gap:.5rem;
    padding:.55rem .75rem; padding-top:calc(.55rem + env(safe-area-inset-top));
    background:var(--header-bg); backdrop-filter:saturate(180%) blur(10px);
    -webkit-backdrop-filter:saturate(180%) blur(10px);
    border-bottom:1px solid var(--border-soft);
  }
  .doc-title{
    flex:1 1 auto; min-width:0;
    font-size:clamp(.9rem,3.3vw,1.1rem); font-weight:600; letter-spacing:-.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:var(--text);
  }
  .doc-title:empty::before{content:"";}
  .actions{flex:0 0 auto; display:flex; align-items:center; gap:.1rem}
  .iconbtn{
    display:inline-grid; place-items:center;
    width:40px; height:40px; padding:0;
    background:transparent; color:var(--text); border:0; border-radius:9px;
    cursor:pointer; -webkit-tap-highlight-color:transparent;
    transition:background .15s ease, transform .1s ease;
  }
  .iconbtn:hover{background:var(--hover)}
  .iconbtn:active{transform:scale(.92)}
  .iconbtn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .iconbtn svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}

  /* Color swatch / picker (native input styled as a round-ish swatch) */
  .swatch{
    width:40px; height:40px; padding:0; margin:0;
    border:0; border-radius:9px; background:transparent; cursor:pointer;
    -webkit-appearance:none; appearance:none; -webkit-tap-highlight-color:transparent;
  }
  .swatch:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .swatch::-webkit-color-swatch-wrapper{padding:7px}
  .swatch::-webkit-color-swatch{border:1px solid var(--border); border-radius:50%}
  .swatch::-moz-color-swatch{border:1px solid var(--border); border-radius:50%}

  /* ---------- Auto-hiding header while viewing ---------- */
  .hover-zone{display:none}
  body.viewing .hover-zone{display:block; position:fixed; top:0; left:0; right:0; height:22px; z-index:35}
  body.viewing .topbar{
    position:fixed; top:0; left:0; right:0; z-index:36;
    transform:translateY(-115%); transition:transform .28s ease;
  }
  body.viewing.peek .topbar{transform:translateY(0); box-shadow:0 6px 22px var(--shadow)}
  @media (hover:hover){
    body.viewing .hover-zone:hover ~ .topbar,
    body.viewing .topbar:hover{transform:translateY(0); box-shadow:0 6px 22px var(--shadow)}
  }

  /* ---------- Main ---------- */
  main{flex:1 1 auto; width:100%; display:flex; flex-direction:column}
  .empty{
    flex:1 1 auto; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:2rem 1.25rem; cursor:pointer; color:var(--muted);
  }
  .empty-inner{
    max-width:30rem; display:flex; flex-direction:column; align-items:center; gap:.35rem;
    border:2px dashed var(--border); border-radius:16px; padding:2.25rem 1.5rem; width:100%;
    transition:border-color .15s ease, background .15s ease;
  }
  .empty:hover .empty-inner{border-color:var(--accent); background:var(--overlay)}
  .empty svg{width:46px;height:46px;stroke:var(--accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;margin-bottom:.4rem}
  .empty-title{margin:0;font-size:1.1rem;font-weight:650;color:var(--text)}
  .empty-sub{margin:0;font-size:.9rem}

  .markdown-body{width:100%; max-width:54rem; margin:0 auto; padding:1.25rem 1.1rem 2.5rem}

  /* ---------- Footer ---------- */
  .footer{
    border-top:1px solid var(--border-soft);
    padding:.85rem 1rem; padding-bottom:calc(.85rem + env(safe-area-inset-bottom));
    text-align:center; color:var(--muted); font-size:.8rem; line-height:1.5;
  }
  .footer p{margin:0}
  .footer a{color:var(--muted); text-decoration:underline; text-underline-offset:2px}
  .footer a:hover{color:var(--accent)}

  /* ---------- Drop overlay ---------- */
  .drop-overlay{
    position:fixed; inset:0; z-index:50; display:none;
    align-items:center; justify-content:center; padding:1.5rem;
    background:var(--overlay); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
  }
  .drop-overlay.show{display:flex}
  .drop-card{
    display:flex; flex-direction:column; align-items:center; gap:.75rem;
    padding:2.5rem 3rem; border:3px dashed var(--accent); border-radius:20px;
    background:var(--surface); color:var(--accent); font-size:1.25rem; font-weight:650;
    box-shadow:0 20px 50px var(--shadow); pointer-events:none;
  }
  .drop-card svg{width:54px;height:54px;stroke:var(--accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed; left:50%; bottom:calc(1.25rem + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(1rem);
    background:var(--text); color:var(--bg); padding:.6rem 1rem; border-radius:10px;
    font-size:.85rem; font-weight:550; box-shadow:0 8px 24px var(--shadow);
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease; z-index:60;
    max-width:90vw; text-align:center;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* ---------- Rendered Markdown ---------- */
  .markdown-body>:first-child{margin-top:0}
  .markdown-body>:last-child{margin-bottom:0}
  .markdown-body h1,.markdown-body h2,.markdown-body h3,
  .markdown-body h4,.markdown-body h5,.markdown-body h6{
    margin:1.5em 0 .6em; font-weight:700; line-height:1.25; letter-spacing:-.01em;
  }
  .markdown-body h1{font-size:1.9em; padding-bottom:.3em; border-bottom:1px solid var(--border-soft)}
  .markdown-body h2{font-size:1.5em; padding-bottom:.3em; border-bottom:1px solid var(--border-soft)}
  .markdown-body h3{font-size:1.25em}
  .markdown-body h4{font-size:1.05em}
  .markdown-body h5{font-size:.95em}
  .markdown-body h6{font-size:.85em; color:var(--muted)}
  .markdown-body p{margin:0 0 1em}
  .markdown-body a{color:var(--accent); text-decoration:none}
  .markdown-body a:hover{text-decoration:underline}
  .markdown-body strong{font-weight:700}
  .markdown-body ul,.markdown-body ol{margin:0 0 1em; padding-left:1.6em}
  .markdown-body li{margin:.25em 0}
  .markdown-body li>p{margin:.25em 0}
  .markdown-body li::marker{color:var(--muted)}
  .markdown-body input[type="checkbox"]{margin:0 .5em 0 -1.3em; vertical-align:middle}
  .markdown-body blockquote{
    margin:0 0 1em; padding:.2em 1em; color:var(--muted);
    border-left:.28em solid var(--quote-border);
  }
  .markdown-body blockquote>:last-child{margin-bottom:0}
  .markdown-body code{
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; font-size:.88em;
    background:var(--code-bg); color:var(--code-text);
    padding:.2em .4em; border-radius:6px;
  }
  .markdown-body pre{
    margin:0 0 1em; padding:1em; overflow:auto; line-height:1.45;
    background:var(--code-bg); border:1px solid var(--border-soft); border-radius:10px;
  }
  .markdown-body pre code{padding:0; background:transparent; font-size:.85em; white-space:pre}
  .markdown-body img{max-width:100%; height:auto; border-radius:8px}
  .markdown-body hr{height:1px; margin:1.75em 0; border:0; background:var(--border)}
  .markdown-body table{border-collapse:collapse; width:100%; margin:0 0 1em; display:block; overflow:auto}
  .markdown-body th,.markdown-body td{padding:.5em .85em; border:1px solid var(--border)}
  .markdown-body th{background:var(--code-bg); font-weight:650; text-align:left}
  .markdown-body tr:nth-child(2n) td{background:var(--table-stripe)}
  .markdown-body kbd{
    font-family:ui-monospace,monospace; font-size:.8em; padding:.15em .45em;
    border:1px solid var(--border); border-bottom-width:2px; border-radius:6px; background:var(--code-bg);
  }
  .markdown-body details{margin:0 0 1em; padding:.5em .9em; border:1px solid var(--border-soft); border-radius:10px}
  .markdown-body summary{cursor:pointer; font-weight:600}

  @media (min-width:640px){
    .topbar{padding-left:1rem; padding-right:1rem}
    .markdown-body{padding:1.75rem 1.5rem 3rem}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<a class="skip" href="#main">Skip to content</a>

<div class="hover-zone" id="hoverZone" aria-hidden="true"></div>

<header class="topbar">
  <span class="doc-title" id="docTitle"></span>
  <nav class="actions" aria-label="Actions">
    <button id="btnNew" class="iconbtn" type="button" title="New — clear &amp; open a file" aria-label="New: clear and open a file">
      <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    <button id="btnCopy" class="iconbtn" type="button" title="Copy Markdown source" aria-label="Copy Markdown source">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
    </button>
    <button id="btnClear" class="iconbtn" type="button" title="Clear" aria-label="Clear the view">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6M14 11v6"></path><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"></path></svg>
    </button>
    <input id="bgPicker" class="swatch" type="color" value="#ffffff" title="Background color" aria-label="Pick background color">
  </nav>
</header>

<main id="main">
  <section id="empty" class="empty" role="button" tabindex="0" aria-label="Open a file">
    <div class="empty-inner">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
      <p class="empty-title">Drop a Markdown file to view</p>
      <p class="empty-sub">Drag &amp; drop anywhere, paste, or tap to open. Any text file works.</p>
    </div>
  </section>
  <article id="content" class="markdown-body" hidden></article>
</main>

<footer class="footer">
  <p>&copy; 2026 | Created with &#10084;&#65039; by <a href="https://michalferber.dev" target="_blank" rel="noopener noreferrer">Michal Ferber</a>, aka <a href="https://techguywithabeard.com" target="_blank" rel="noopener noreferrer">TechGuyWithABeard</a></p>
</footer>

<div id="dropOverlay" class="drop-overlay" aria-hidden="true">
  <div class="drop-card">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    <span>Drop to view</span>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>
<input id="fileInput" type="file" accept=".md,.markdown,.mdown,.mkd,.mkdn,.mdx,.txt,.text,.log,.json,.yml,.yaml,.csv,text/*" hidden>

</script>
<script>
(function(){
  "use strict";
  var doc = document, root = doc.documentElement, body = doc.body;
  var content   = doc.getElementById("content");
  var empty     = doc.getElementById("empty");
  var fileInput = doc.getElementById("fileInput");
  var overlay   = doc.getElementById("dropOverlay");
  var toastEl   = doc.getElementById("toast");
  var docTitle  = doc.getElementById("docTitle");
  var hoverZone = doc.getElementById("hoverZone");
  var bgPicker  = doc.getElementById("bgPicker");
  var themeColor= doc.getElementById("themeColor");
  var rawText   = "";
  var toastTimer = null;
  var BASE_TITLE = "MyKK Markdown Viewer";

  if (window.marked && typeof marked.setOptions === "function") {
    marked.setOptions({ gfm: true, breaks: false });
  }

  function toast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove("show"); }, 1900);
  }

  function render(text, title){
    rawText = text;
    var html = window.marked ? marked.parse(text) : text;
    if (window.DOMPurify) html = DOMPurify.sanitize(html, { ADD_ATTR: ["target"] });
    content.innerHTML = html;
    var links = content.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++){
      links[i].setAttribute("target", "_blank");
      links[i].setAttribute("rel", "noopener noreferrer");
    }
    content.hidden = false;
    empty.hidden = true;
    docTitle.textContent = title || "";
    doc.title = title ? title + " — " + BASE_TITLE : BASE_TITLE;
    body.classList.add("viewing");
    body.classList.remove("peek");
    window.scrollTo(0, 0);
  }

  function clearAll(){
    rawText = "";
    content.innerHTML = "";
    content.hidden = true;
    empty.hidden = false;
    docTitle.textContent = "";
    doc.title = BASE_TITLE;
    body.classList.remove("viewing", "peek");
  }

  function readFile(file){
    if (!file) return;
    var reader = new FileReader();
    reader.onload  = function(e){ render(String(e.target.result || ""), file.name); };
    reader.onerror = function(){ toast("Could not read that file"); };
    reader.readAsText(file);
  }

  function openDialog(){ fileInput.click(); }

  fileInput.addEventListener("change", function(e){
    var f = e.target.files && e.target.files[0];
    if (f) readFile(f);
    fileInput.value = "";
  });

  // "+" : clear the screen, then open the file dialog
  doc.getElementById("btnNew").addEventListener("click", function(){
    clearAll();
    openDialog();
  });

  // Copy the raw Markdown source
  doc.getElementById("btnCopy").addEventListener("click", function(){
    if (!rawText){ toast("Nothing to copy yet"); return; }
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(rawText).then(
        function(){ toast("Markdown copied"); },
        function(){ fallbackCopy(rawText); }
      );
    } else {
      fallbackCopy(rawText);
    }
  });

  function fallbackCopy(text){
    var ta = doc.createElement("textarea");
    ta.value = text; ta.setAttribute("readonly", "");
    ta.style.position = "fixed"; ta.style.opacity = "0";
    doc.body.appendChild(ta); ta.select();
    try { doc.execCommand("copy"); toast("Markdown copied"); }
    catch (err){ toast("Copy not supported"); }
    doc.body.removeChild(ta);
  }

  doc.getElementById("btnClear").addEventListener("click", clearAll);

  // Empty-state acts as an open button (great on mobile)
  empty.addEventListener("click", openDialog);
  empty.addEventListener("keydown", function(e){
    if (e.key === "Enter" || e.key === " "){ e.preventDefault(); openDialog(); }
  });

  // Reveal/peek the hidden header by tapping the top strip (touch); desktop uses CSS :hover.
  hoverZone.addEventListener("click", function(){ body.classList.toggle("peek"); });
  content.addEventListener("click", function(){ body.classList.remove("peek"); });

  // ---------- Background color (chosen by the user, remembered in a cookie) ----------
  function setCookie(name, val){
    doc.cookie = name + "=" + encodeURIComponent(val) + "; max-age=31536000; path=/; SameSite=Lax";
  }
  function getCookie(name){
    var m = doc.cookie.match("(?:^|; )" + name.replace(/([.*+?^${}()|[\]\\])/g, "\\$1") + "=([^;]*)");
    return m ? decodeURIComponent(m[1]) : null;
  }
  function hexToRgb(h){
    h = h.replace("#", "");
    if (h.length === 3) h = h.charAt(0)+h.charAt(0)+h.charAt(1)+h.charAt(1)+h.charAt(2)+h.charAt(2);
    var n = parseInt(h, 16);
    return { r:(n>>16)&255, g:(n>>8)&255, b:n&255 };
  }
  function srgb(c){ c/=255; return c<=0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4); }
  function luminance(rgb){ return 0.2126*srgb(rgb.r) + 0.7152*srgb(rgb.g) + 0.0722*srgb(rgb.b); }
  function mix(a, b, t){
    return "rgb(" + Math.round(a.r+(b.r-a.r)*t) + "," + Math.round(a.g+(b.g-a.g)*t) + "," + Math.round(a.b+(b.b-a.b)*t) + ")";
  }
  function rgbStr(c){ return "rgb(" + c.r + "," + c.g + "," + c.b + ")"; }

  function applyColor(hex){
    if (!/^#([0-9a-f]{3}|[0-9a-f]{6})$/i.test(hex)) hex = "#ffffff";
    var bg = hexToRgb(hex);
    // Pick black or white text by whichever contrasts better (crossover ~0.179).
    var lightText = luminance(bg) <= 0.179;          // dark background -> light text
    var text = lightText ? { r:240, g:243, b:246 } : { r:31, g:35, b:40 };
    var accentHex = lightText ? "#8b93ff" : "#4f46e5";
    var ac = hexToRgb(accentHex);
    var s = root.style;
    s.setProperty("--bg", hex);
    s.setProperty("--surface", hex);
    s.setProperty("--text", rgbStr(text));
    s.setProperty("--code-text", rgbStr(text));
    s.setProperty("--muted", mix(bg, text, 0.45));
    s.setProperty("--border", mix(bg, text, 0.24));
    s.setProperty("--border-soft", mix(bg, text, 0.13));
    s.setProperty("--code-bg", mix(bg, text, 0.07));
    s.setProperty("--hover", mix(bg, text, 0.10));
    s.setProperty("--table-stripe", mix(bg, text, 0.05));
    s.setProperty("--quote-border", mix(bg, text, 0.26));
    s.setProperty("--accent", accentHex);
    s.setProperty("--accent-contrast", lightText ? "#0d1117" : "#ffffff");
    s.setProperty("--overlay", "rgba(" + ac.r + "," + ac.g + "," + ac.b + ",0.12)");
    s.setProperty("--shadow", lightText ? "rgba(0,0,0,0.6)" : "rgba(0,0,0,0.12)");
    s.setProperty("--header-bg", "rgba(" + bg.r + "," + bg.g + "," + bg.b + ",0.9)");
    s.colorScheme = lightText ? "dark" : "light";
    themeColor.setAttribute("content", hex);
  }

  function isHex6(v){ return /^#([0-9a-f]{6})$/i.test(v || ""); }
  function saveColor(val){
    setCookie("mykk-bg", val);                                  // primary
    try { localStorage.setItem("mykk-bg", val); } catch (e) {}  // fallback (e.g. file://)
  }
  function loadColor(){
    var v = getCookie("mykk-bg");
    if (!isHex6(v)) { try { v = localStorage.getItem("mykk-bg"); } catch (e) { v = null; } }
    return isHex6(v) ? v : "#ffffff";
  }

  var saved = loadColor();
  bgPicker.value = saved;
  applyColor(saved);
  bgPicker.addEventListener("input", function(){
    applyColor(bgPicker.value);
    saveColor(bgPicker.value);
  });

  // ---------- Drag & drop (anywhere) ----------
  var dragDepth = 0;
  function showOverlay(s){ overlay.classList.toggle("show", s); }
  window.addEventListener("dragenter", function(e){
    if (e.dataTransfer && Array.prototype.indexOf.call(e.dataTransfer.types || [], "Files") === -1) return;
    e.preventDefault(); dragDepth++; showOverlay(true);
  });
  window.addEventListener("dragover", function(e){
    e.preventDefault();
    if (e.dataTransfer) e.dataTransfer.dropEffect = "copy";
  });
  window.addEventListener("dragleave", function(e){
    e.preventDefault(); dragDepth--; if (dragDepth <= 0){ dragDepth = 0; showOverlay(false); }
  });
  window.addEventListener("drop", function(e){
    e.preventDefault(); dragDepth = 0; showOverlay(false);
    var dt = e.dataTransfer; if (!dt) return;
    if (dt.files && dt.files.length){ readFile(dt.files[0]); return; }
    var txt = dt.getData && dt.getData("text");
    if (txt) render(txt, "");
  });

  // ---------- Paste to view ----------
  window.addEventListener("paste", function(e){
    var cd = e.clipboardData || window.clipboardData;
    if (!cd) return;
    if (cd.files && cd.files.length){ e.preventDefault(); readFile(cd.files[0]); return; }
    var txt = cd.getData && cd.getData("text");
    if (txt){ e.preventDefault(); render(txt, ""); }
  });
})();
</script>
</body>
</html>
